<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Logístico — Fira de Barcelona</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#FFB3C6;--pink-d:#FF85A1;--peach:#FFDAB9;--peach-d:#FFBE8A;
  --mint:#B5EAD7;--mint-d:#7DDBB8;--lav:#C9B8F5;--lav-d:#A98EE8;
  --sky:#B3D9FF;--bg:#FFF8F5;--card:#FFFFFF;
  --text:#4A3F5C;--text-s:#7E6E96;--text-h:#C4B8D8;
  --border:#F0E8FF;--shadow:rgba(180,150,220,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;min-height:100vh;
  background-image:
    radial-gradient(circle at 10% 10%,rgba(255,179,198,.25) 0%,transparent 40%),
    radial-gradient(circle at 90% 15%,rgba(201,184,245,.22) 0%,transparent 40%),
    radial-gradient(circle at 50% 95%,rgba(181,234,215,.2) 0%,transparent 40%);}

.header{text-align:center;padding:1.8rem 1rem 1rem;flex-shrink:0;}
.header-logo{width:60px;height:60px;border-radius:18px;
  background:linear-gradient(135deg,var(--lav),var(--pink-d));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;margin-bottom:10px;box-shadow:0 8px 22px rgba(169,142,232,.3);}
.header h1{font-family:'Quicksand',sans-serif;font-size:1.6rem;font-weight:700;
  background:linear-gradient(135deg,#C77DFF,#FF85A1,#7DDBB8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.header p{color:var(--text-s);font-size:.85rem;font-weight:500;}
.lang-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:8px;}
.lang-pill{background:white;border:1.5px solid var(--border);padding:2px 10px;
  border-radius:999px;font-size:11px;font-weight:700;color:var(--text-s);
  box-shadow:0 2px 6px var(--shadow);}

.wrap{max-width:700px;width:100%;margin:0 auto;padding:0 1rem 1.5rem;
  flex:1;display:flex;flex-direction:column;}

.card{background:var(--card);border-radius:22px;border:1.5px solid var(--border);
  padding:1.4rem;box-shadow:0 4px 24px var(--shadow);
  display:flex;flex-direction:column;flex:1;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  border-radius:22px 22px 0 0;
  background:linear-gradient(90deg,var(--mint-d),var(--lav-d));}

.chat-msgs{display:flex;flex-direction:column;gap:13px;
  flex:1;overflow-y:auto;padding:4px 2px;min-height:200px;
  scrollbar-width:thin;scrollbar-color:var(--lav) transparent;}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--lav);border-radius:99px;}

.mrow{display:flex;gap:9px;align-items:flex-end;}
.mrow.user{flex-direction:row-reverse;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;
  box-shadow:0 3px 10px var(--shadow);}
.av.bot{background:linear-gradient(135deg,var(--lav),var(--mint));color:#5A3F8A;}
.av.user{background:linear-gradient(135deg,var(--pink),var(--peach-d));color:#8A3F5A;}
.bwrap{display:flex;flex-direction:column;max-width:78%;}
.mrow.user .bwrap{align-items:flex-end;}
.bubble{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.65;
  box-shadow:0 3px 12px var(--shadow);
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble.bot{background:white;color:var(--text);border:1.5px solid var(--border);border-bottom-left-radius:4px;}
.bubble.user{background:linear-gradient(135deg,var(--pink-d),#FF9BB0);color:white;font-weight:600;border-bottom-right-radius:4px;}
.bmeta{font-size:10px;color:var(--text-h);margin-top:3px;font-weight:600;padding:0 2px;}

.tdots{display:flex;gap:5px;padding:3px 2px;}
.tdots span{width:7px;height:7px;border-radius:50%;
  background:linear-gradient(135deg,var(--lav),var(--mint-d));animation:bnc 1.1s infinite;}
.tdots span:nth-child(2){animation-delay:.18s}.tdots span:nth-child(3){animation-delay:.36s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

.input-bar{display:flex;margin-top:14px;
  background:linear-gradient(135deg,rgba(255,240,248,.9),rgba(240,240,255,.9));
  border:1.5px solid var(--border);border-radius:17px;padding:8px 8px 8px 15px;
  align-items:center;gap:9px;box-shadow:0 4px 18px var(--shadow);flex-shrink:0;}
.input-bar input{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;
  font-size:14px;color:var(--text);outline:none;}
.input-bar input::placeholder{color:var(--text-h);font-weight:500;}
.send-btn{width:42px;height:42px;border-radius:13px;border:none;
  background:linear-gradient(135deg,var(--lav-d),var(--pink-d));color:white;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(169,142,232,.4);flex-shrink:0;}
.send-btn:hover{transform:scale(1.08);}
.send-btn:active{transform:scale(.96);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.lang-det{font-size:11px;color:var(--text-s);font-weight:600;
  margin-top:5px;min-height:16px;padding-left:3px;text-align:center;}

.topics{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.topic-btn{padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);
  background:white;font-size:12px;font-weight:700;color:var(--text-s);cursor:pointer;
  transition:all .15s;font-family:'Nunito',sans-serif;}
.topic-btn:hover{background:var(--lav);border-color:var(--lav-d);color:#5A3F8A;transform:translateY(-1px);}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏗️</div>
  <h1>Asistente Logístico</h1>
  <p>Fira de Barcelona — Servicios de Logística</p>
  <div class="lang-pills">
    <span class="lang-pill">🇪🇸 Español</span>
    <span class="lang-pill">🇬🇧 English</span>
    <span class="lang-pill">🇫🇷 Français</span>
    <span class="lang-pill">🇩🇪 Deutsch</span>
    <span class="lang-pill">🏴󠁥󠁳󠁣󠁴󠁿 Català</span>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="topics" id="topics">
      <button class="topic-btn" onclick="askTopic('¿Qué servicios ofrecen?')">📦 Servicios</button>
      <button class="topic-btn" onclick="askTopic('¿Cómo reservo una descarga de camión?')">🚛 Descargas</button>
      <button class="topic-btn" onclick="askTopic('¿Cómo alquilo maquinaria?')">🏗️ Maquinaria</button>
      <button class="topic-btn" onclick="askTopic('¿Cómo funciona el almacenaje?')">🗄️ Almacenaje</button>
      <button class="topic-btn" onclick="askTopic('¿Dónde están las oficinas?')">📍 Oficinas</button>
      <button class="topic-btn" onclick="askTopic('¿Cuáles son los horarios?')">🕐 Horarios</button>
    </div>

    <div id="chat-msgs" class="chat-msgs"></div>
    <div id="lang-det" class="lang-det"></div>

    <div class="input-bar">
      <input type="text" id="ci" placeholder="Escribe tu consulta en cualquier idioma…" onkeydown="if(event.key==='Enter')send()">
      <button class="send-btn" id="sbtn" onclick="send()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://chabot-ac.vercel.app/api/chat";
const BOT_NAME = "Asistente Logístico";

window.onload = () => {
  addMsg('bot', '¡Hola! 👋 Soy el <strong>Asistente Logístico de Fira de Barcelona</strong>. Puedo ayudarte con información sobre descargas, maquinaria, almacenaje y más. ¿En qué puedo ayudarte hoy?');
};

function askTopic(q) {
  document.getElementById('ci').value = q;
  send();
}

function addMsg(who, html) {
  const box = document.getElementById('chat-msgs');
  const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const row = document.createElement('div'); row.className=`mrow ${who}`;
  const av = document.createElement('div'); av.className=`av ${who}`;
  av.textContent = who==='bot' ? '🏗️' : '🙂';
  const wrap = document.createElement('div'); wrap.className='bwrap';
  const bub = document.createElement('div'); bub.className=`bubble ${who}`; bub.innerHTML=html;
  const meta = document.createElement('div'); meta.className='bmeta'; meta.textContent=now;
  wrap.appendChild(bub); wrap.appendChild(meta);
  if(who==='bot'){row.appendChild(av);row.appendChild(wrap);}
  else{row.appendChild(wrap);row.appendChild(av);}
  box.appendChild(row); box.scrollTop=box.scrollHeight;
}

function addThinking() {
  const box = document.getElementById('chat-msgs');
  const row=document.createElement('div'); row.className='mrow bot'; row.id='thk';
  const av=document.createElement('div'); av.className='av bot'; av.textContent='🏗️';
  const wrap=document.createElement('div'); wrap.className='bwrap';
  const bub=document.createElement('div'); bub.className='bubble bot';
  bub.innerHTML='<div class="tdots"><span></span><span></span><span></span></div>';
  wrap.appendChild(bub); row.appendChild(av); row.appendChild(wrap);
  box.appendChild(row); box.scrollTop=box.scrollHeight;
}

async function send() {
  const ci=document.getElementById('ci'), btn=document.getElementById('sbtn');
  const txt=ci.value.trim();
  if(!txt) return;
  ci.value=''; btn.disabled=true;
  document.getElementById('lang-det').textContent='';
  addMsg('user', txt);
  addThinking();

  try {
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: txt, botName: BOT_NAME })
    });
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    document.getElementById('thk')?.remove();
    addMsg('bot', data.reply);
    document.getElementById('lang-det').textContent='🌍 Respondiendo en tu idioma automáticamente';
  } catch(err) {
    document.getElementById('thk')?.remove();
    addMsg('bot','Lo siento, hubo un problema de conexión. Por favor intenta de nuevo. 🙈');
  }
  btn.disabled=false; ci.focus();
}
</script>
</body>
</html>
